server:
  port: 8080

payment:
  rules:
    max-limit: 150000.00


resilience4j:
  circuitbreaker:
    instances:
      antiFraudProvider:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5           
        failureRateThreshold: 50       
        minimumNumberOfCalls: 3        
        waitDurationInOpenState: 15s   
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
  
  timelimiter:
    instances:
      antiFraudProvider:
        timeoutDuration: 2s           


management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always